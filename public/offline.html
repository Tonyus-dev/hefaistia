<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0a09" />
    <title>Kaline sem conexão</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0b0a09;
        color: #f7efe4;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(201, 138, 101, 0.18), transparent 34rem), #0b0a09;
      }
      main {
        max-width: 34rem;
        border: 1px solid rgba(247, 239, 228, 0.14);
        border-radius: 24px;
        padding: 28px;
        background: rgba(8, 8, 14, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
      }
      h1 {
        margin: 0 0 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.8rem, 8vw, 2.6rem);
        line-height: 1;
      }
      p {
        margin: 0 0 14px;
        color: rgba(247, 239, 228, 0.72);
        line-height: 1.6;
      }
      button {
        margin-top: 10px;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: #c98a65;
        color: #08080e;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Kaline está sem conexão.</h1>
      <p>
        Algumas superfícies podem abrir com dados já carregados, mas novidades, APIs e conteúdos
        privados precisam da rede.
      </p>
      <p>Tente novamente quando a conexão voltar.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
